<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 頂級數據主控台</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --mlb-blue: #041e42;
            --accent-orange: #ea580c;
            --success-green: #10b981;
            --live-pulse: #ef4444;
            --border-color: #f1f5f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #f8fafc; 
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; color: #ffffff; }
        header p { color: #94a3b8; font-size: 1.1rem; }
        
        /* 日期導覽列 */
        .date-nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .date-btn { 
            background: var(--bg-secondary); border: 1px solid #334155; color: #94a3b8; 
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; 
            transition: all 0.2s ease; white-space: nowrap;
        }
        .date-btn:hover { border-color: #64748b; color: #fff; }
        .date-btn.active { background: #38bdf8; border-color: #38bdf8; color: var(--bg-primary); box-shadow: 0 4px 14px rgba(56,189,248,0.3); }

        /* 賽事網格 */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 50px; }
        .game-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); color: var(--text-main); display: flex; flex-direction: column; justify-content: space-between; }
        
        /* 卡片頭部狀態與時間 */
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; }
        .game-time { font-weight: 700; font-size: 1.1rem; color: var(--mlb-blue); background: #f1f5f9; padding: 2px 8px; border-radius: 6px; }
        
        /* 💡 狀態標籤樣式定義 */
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-upcoming { background-color: #e2e8f0; color: #64748b; }
        .status-live { background-color: #ffeeef; color: var(--live-pulse); border: 1px solid #fecaca; animation: pulse 1.5s infinite; }
        .status-final { background-color: #f0fdf4; color: var(--success-green); border: 1px solid #bbf7d0; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* RHE 表格樣式 */
        .rhe-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .rhe-table th, .rhe-table td { padding: 8px; text-align: center; font-size: 0.95rem; }
        .rhe-table th { color: var(--text-muted); font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid var(--border-color); }
        .rhe-table td { border-bottom: 1px solid var(--border-color); }
        
        /* 投手資訊區塊 */
        .pitcher-container { background: #f8fafc; border-radius: 12px; padding: 12px; margin-top: auto; border: 1px solid var(--border-color); }
        .pitcher-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .pitcher-grid { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; }
        .p-name { font-weight: 600; color: #334155; }

        /* 聯盟戰績表按鈕 */
        .map-link-btn {
            display: inline-block; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px;
            text-decoration: none; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(29,78,216,0.4);
            transition: transform 0.2s ease;
        }
        .map-link-btn:hover { transform: translateY(-2px); }
        footer { text-align: center; padding: 40px 0; color: #64748b; font-size: 0.9rem; border-top: 1px solid #334155; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sportscast Sigma</h1>
        <p>真實數據主控台（純事實、無預測、台灣開賽時間）</p>
        <div style="margin-top:20px; font-size:0.85rem; color:#64748b;" id="sync-time">資料同步中...</div>
    </header>

    <div style="text-align: center;">
        <a href="mlbmap.html" class="map-link-btn">🗺️ 查看 MLB 30球隊朝聖指南</a>
    </div>

    <div class="date-nav" id="date-navbar"></div>

    <div class="games-grid" id="games-container"></div>
</div>

<footer>
    <p>© 2026 Sportscast Sigma. 數據串接自大聯盟官方統計 API.</p>
</footer>

<script>
    let globalData = {};

    // 啟動載入
    fetch('data.json?t=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            globalData = data;
            document.getElementById('sync-time').innerText = `最後雲端同步時間 (台北): ${data.meta.last_updated}`;
            buildDateNavbar();
        })
        .catch(err => {
            console.error("無法載入資料:", err);
            document.getElementById('games-container').innerHTML = '<div style="color:#ef4444; padding:20px;">無法讀取最新 data.json，請確認 Actions 是否成功執行。</div>';
        });

    // 建立日期導覽列
    function buildDateNavbar() {
        const navbar = document.getElementById('date-navbar');
        navbar.innerHTML = '';
        
        // 抓出排序好的所有日期
        const sortedDates = Object.keys(globalData.dates).sort();
        
        if(sortedDates.length === 0) return;

        sortedDates.forEach((dateStr, idx) => {
            const btn = document.createElement('button');
            btn.className = 'date-btn';
            
            // 簡化日期文字顯示 (將 2026-06-15 變成 06/15)
            const parts = dateStr.split('-');
            btn.innerText = `${parts[1]}/${parts[2]}`;
            
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(dateStr);
            };

            // 預設選取第一個日期（今天）
            if(idx === 0) {
                btn.classList.add('active');
                renderGames(dateStr);
            }
            navbar.appendChild(btn);
        });
    }

    // 渲染賽事卡片
    function renderGames(dateStr) {
        const grid = document.getElementById('games-container');
        grid.innerHTML = '';
        const games = globalData.dates[dateStr] || [];

        if(games.length === 0) {
            grid.innerHTML = '<div style="color:#94a3b8; padding:20px; grid-column: 1/-1; text-align:center;">📅 台灣時間此日無安排賽事</div>';
            return;
        }

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            // 💡 修改點：精確區分三種比賽狀態的標籤與燈號
            let statusClass = 'status-upcoming';
            let statusLabel = '未開始';
            
            if(game.status === 'Live') { 
                statusClass = 'status-live'; 
                statusLabel = '🔴 比賽中'; 
            } else if(game.status === 'Final') { 
                statusClass = 'status-final'; 
                statusLabel = '已結束'; 
            }

            // 無論比賽打過與否，外殼 HTML R-H-E 表格骨架維持一致，數據為空時自動補「-」
            card.innerHTML = `
                <div class="card-header">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span class="game-time">⏱️ ${game.time}</span>
                </div>
                
                <table class="rhe-table">
                    <thead>
                        <tr>
                            <th style="text-align:left; width:40%;">球隊</th>
                            <th style="width:20%; font-weight:bold; color:var(--accent-orange);">R</th>
                            <th style="width:20%;">H</th>
                            <th style="width:20%;">E</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="text-align:left; font-weight:bold; color:var(--mlb-blue); font-size:1.1rem;">${game.away_team}</td>
                            <td style="font-weight:bold; color:var(--accent-orange); font-size:1.1rem;">${game.rhe?.away?.R ?? '-'}</td>
                            <td>${game.rhe?.away?.H ?? '-'}</td>
                            <td>${game.rhe?.away?.E ?? '-'}</td>
                        </tr>
                        <tr>
                            <td style="text-align:left; font-weight:bold; color:var(--mlb-blue); font-size:1.1rem;">${game.home_team}</td>
                            <td style="font-weight:bold; color:var(--accent-orange); font-size:1.1rem;">${game.rhe?.home?.R ?? '-'}</td>
                            <td>${game.rhe?.home?.H ?? '-'}</td>
                            <td>${game.rhe?.home?.E ?? '-'}</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pitcher-container">
                    <div class="pitcher-title">⚾ 預計先發投手</div>
                    <div class="pitcher-grid">
                        <div><span style="color:var(--text-muted);">${game.away_team}:</span> <span class="p-name">${game.pitchers?.away_starter || '未定 (TBD)'}</span></div>
                        <div><span style="color:var(--text-muted);">${game.home_team}:</span> <span class="p-name">${game.pitchers?.home_starter || '未定 (TBD)'}</span></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
