<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 頂級數據主控台</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --mlb-blue: #041e42;
            --accent-orange: #ea580c;
            --success-green: #10b981;
            --live-pulse: #ef4444;
            --border-color: #f1f5f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #f8fafc; 
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 頂部導覽區 */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }
        h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .meta-info { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }
        
        /* 導覽按鈕群組 */
        .nav-links { display: flex; gap: 15px; }
        .map-btn {
            background: linear-gradient(135deg, #ea580c 0%, #ff7e42 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 4px 14px rgba(234, 88, 12, 0.4);
            transition: all 0.2s ease;
        }
        .map-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(234, 88, 12, 0.6);
        }

        /* 日期滾動條 */
        .date-selector {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .date-btn {
            background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; padding: 10px 20px; border-radius: 8px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .date-btn.active, .date-btn:hover {
            background: #fff; color: var(--bg-primary); border-color: #fff;
        }

        /* 賽事卡片網格 */
        .games-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px; margin-bottom: 50px;
        }
        .game-card {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            color: var(--text-main); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-upcoming { background: #f1f5f9; color: #475569; }
        .status-live { background: #fee2e2; color: #ef4444; animation: pulse 2s infinite; }
        .status-final { background: #dcfce7; color: #15803d; }
        .game-time { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }

        /* 比分與球隊樣式 */
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .team-info { display: flex; align-items: center; gap: 10px; }
        .team-name { font-size: 1.1rem; font-weight: 700; color: var(--bg-primary); }
        .team-score { font-size: 1.3rem; font-weight: 800; }
        
        /* RHE 表格 */
        .rhe-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.85rem; text-align: center; }
        .rhe-table th { color: var(--text-muted); font-weight: 600; padding: 4px; border-bottom: 1px solid var(--border-color); }
        .rhe-table td { font-weight: 700; padding: 6px; color: var(--bg-primary); }

        /* 先發投手 */
        .pitcher-container { background: #f8fafc; border-radius: 10px; padding: 12px; margin-top: 15px; border-left: 4px solid var(--mlb-blue); }
        .pitcher-title { font-size: 0.75rem; color: var(--text-muted); font-weight: bold; margin-bottom: 6px; }
        .pitcher-grid { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .p-name { font-weight: 600; color: #334155; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- 分區排名區塊樣式 --- */
        .section-title { font-size: 1.6rem; font-weight: 700; margin: 40px 0 20px 0; color: #fff; display: flex; align-items: center; gap: 10px; border-left: 5px solid #ea580c; padding-left: 12px;}
        .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(560px, 1fr)); gap: 30px; }
        .division-card { background: var(--bg-secondary); border-radius: 14px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); }
        .div-name { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .std-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem; color: #cbd5e1; }
        .std-table th { padding: 8px; font-weight: 600; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .std-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .std-table tr:hover { background: rgba(255,255,255,0.03); }
        .text-left { text-align: left; font-weight: 700; color: #fff; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Sportscast Sigma 主控台</h1>
            <div class="meta-info" id="last-updated">最後更新：讀取中...</div>
        </div>
        <div class="nav-links">
            <a href="mlbmap.html" class="map-btn">🗺️ 球場朝聖地圖</a>
        </div>
    </header>

    <div class="section-title">📅 賽事一週動態面板</div>
    <div class="date-selector" id="date-tabs"></div>
    <div class="games-grid" id="games-container"></div>

    <div class="section-title">📊 大聯盟即時分區排名 (Standings)</div>
    <div class="standings-grid" id="standings-container"></div>
</div>

<script>
    let globalData = null;

    // 初始化載入
    document.addEventListener("DOMContentLoaded", () => {
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                globalData = data;
                document.getElementById('last-updated').innerText = `最後更新：${data.meta.last_updated} (台北時間)`;
                
                // 1. 建立日期切換籤
                renderDateTabs();
                // 2. 繪製戰績排名表格
                renderStandings();
            })
            .catch(err => console.error("無法載入資料:", err));
    });

    function renderDateTabs() {
        const tabsContainer = document.getElementById('date-tabs');
        const dates = Object.keys(globalData.dates).sort();
        
        dates.forEach((dateStr, idx) => {
            const btn = document.createElement('button');
            btn.className = `date-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = dateStr;
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(dateStr);
            };
            tabsContainer.appendChild(btn);
        });

        if(dates.length > 0) renderGames(dates[0]);
    }

    function renderGames(dateStr) {
        const grid = document.getElementById('games-container');
        grid.innerHTML = '';
        const games = globalData.dates[dateStr] || [];

        if(games.length === 0) {
            grid.innerHTML = '<div style="color:#94a3b8; padding:20px;">今日無安排賽事</div>';
            return;
        }

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            let statusClass = 'status-upcoming';
            let statusLabel = '未開始';
            if(game.status === 'Live') { statusClass = 'status-live'; statusLabel = '直播中'; }
            else if(game.status === 'Final') { statusClass = 'status-final'; statusLabel = '已結束'; }

            let bodyHTML = '';
            if(game.status === 'Upcoming') {
                bodyHTML = `
                    <div style="padding: 20px 0; text-align: center;">
                        <div style="font-size: 1.4rem; font-weight:800; color:var(--mlb-blue);">${game.away_team} @ ${game.home_team}</div>
                    </div>
                `;
            } else {
                bodyHTML = `
                    <table class="rhe-table">
                        <thead>
                            <tr><th>球隊</th><th>R</th><th>H</th><th>E</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style="text-align:left; font-weight:bold;">${game.away_team}</td>
                                <td>${game.rhe?.away?.R ?? '-'}</td><td>${game.rhe?.away?.H ?? '-'}</td><td>${game.rhe?.away?.E ?? '-'}</td>
                            </tr>
                            <tr>
                                <td style="text-align:left; font-weight:bold;">${game.home_team}</td>
                                <td>${game.rhe?.home?.R ?? '-'}</td><td>${game.rhe?.home?.H ?? '-'}</td><td>${game.rhe?.home?.E ?? '-'}</td>
                            </tr>
                        </tbody>
                    </table>
                `;
            }

            card.innerHTML = `
                <div class="card-header">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span class="game-time">${game.time}</span>
                </div>
                ${bodyHTML}
                <div class="pitcher-container">
                    <div class="pitcher-title">⚾ 預計先發投手</div>
                    <div class="pitcher-grid">
                        <div><span style="color:var(--text-muted);">${game.away_team}:</span> <span class="p-name">${game.pitchers?.away_starter}</span></div>
                        <div><span style="color:var(--text-muted);">${game.home_team}:</span> <span class="p-name">${game.pitchers?.home_starter}</span></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 🚀 動態生成分區排名的函數
    function renderStandings() {
        const container = document.getElementById('standings-container');
        container.innerHTML = '';
        const standings = globalData.standings || {};

        Object.keys(standings).forEach(divName => {
            const divCard = document.createElement('div');
            divCard.className = 'division-card';

            let rowsHTML = '';
            standings[divName].forEach((team, index) => {
                rowsHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="text-left">${team.code} (${team.name})</td>
                        <td>${team.w}</td>
                        <td>${team.l}</td>
                        <td>${team.gb}</td>
                        <td>${team.l10}</td>
                        <td>${team.home}</td>
                        <td>${team.away}</td>
                    </tr>
                `;
            });

            divCard.innerHTML = `
                <div class="div-name">${divName}</div>
                <table class="std-table">
                    <thead>
                        <tr>
                            <th style="width: 40px;">#</th>
                            <th class="text-left">球隊</th>
                            <th style="width: 50px;">勝</th>
                            <th style="width: 50px;">敗</th>
                            <th style="width: 60px;">勝差</th>
                            <th style="width: 70px;">近10場</th>
                            <th style="width: 70px;">主場</th>
                            <th style="width: 70px;">客場</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rowsHTML}
                    </tbody>
                </table>
            `;
            container.appendChild(divCard);
        });
    }
</script>
</body>
</html>
