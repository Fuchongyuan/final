<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - ESPN 換源穩定版</title>
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --mlb-blue: #041e42;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --live-pulse: #ef4444;
            --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-primary); color: var(--text-main); padding: 30px 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--mlb-blue); font-size: 2.2rem; font-weight: 800; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; }
        .update-tag { display: inline-block; background-color: #e2e8f0; color: var(--mlb-blue); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }

        .date-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .date-btn { padding: 8px 18px; font-size: 0.9rem; font-weight: 600; border: 1px solid var(--border-color); background-color: var(--card-bg); border-radius: 20px; cursor: pointer; }
        .date-btn.active { background-color: var(--accent-orange); color: white; border-color: var(--accent-orange); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 950px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.02); overflow: hidden; display: flex; flex-direction: column; }
        .card.live-border { border: 2px solid var(--live-pulse); }

        .card-header { padding: 12px 20px; background-color: #f8fafc; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
        .status-upcoming { background-color: #e0f2fe; color: #0369a1; }
        .status-final { background-color: #fee2e2; color: #b91c1c; }
        .status-live { background-color: #d1fae5; color: var(--success-green); }

        .matchup-row { display: flex; justify-content: space-around; align-items: center; padding: 20px; text-align: center; }
        .team-display { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; }
        .team-name { font-size: 1.2rem; font-weight: 800; }
        .team-record { font-size: 0.75rem; color: var(--text-muted); }
        .live-score { font-size: 1.8rem; font-weight: 900; color: #0f172a; }

        .pitcher-container { padding: 15px 20px; background: #f8fafc; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .section-title { font-size: 0.72rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 6px; text-transform: uppercase; }
        .p-row { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .p-box { width: 48%; }

        .stats-box { padding: 15px 20px; background: #ffffff; }
        .stats-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.8rem; }
        .stats-table th { color: var(--text-muted); padding: 4px; font-weight: 700; border-bottom: 1px solid var(--border-color); }
        .stats-table td { padding: 6px 4px; font-weight: 600; }
        .stats-table tr:nth-child(even) { background-color: #f8fafc; }

        #no-data-msg { text-align: center; padding: 50px; background-color: var(--card-bg); border-radius: 12px; color: var(--text-muted); display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚾ Sportscast Sigma 數據面板 (ESPN 核心引擎)</h1>
        <div class="subtitle">全面對接 ESPN 數據庫，解決大聯盟官方賽前隱藏、清空打者數據的問題</div>
        <div class="update-tag" id="sync-time">正在讀取雲端緩存...</div>
    </header>

    <div class="date-tabs" id="date-tabs-container"></div>
    <div id="no-data-msg">目前選定日期無任何大聯盟賽事排程。</div>
    <div class="dashboard-grid" id="game-grid"></div>
</div>

<script>
    let dataset = {};
    const localTodayStr = new Date().toISOString().split('T')[0];

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('sync-time').innerText = `最後雲端同步：${data.meta?.last_updated || '剛剛'} (台灣時間)`;
            dataset = data.dates || {};
            const dateKeys = Object.keys(dataset).sort();
            if(dateKeys.length === 0) {
                document.getElementById('no-data-msg').style.display = 'block';
                return;
            }
            let defaultDate = dateKeys.includes(localTodayStr) ? localTodayStr : dateKeys[0];
            renderTabs(dateKeys, defaultDate);
            renderGames(defaultDate);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('no-data-msg').style.display = 'block';
        });

    function renderTabs(dates, activeDate) {
        const container = document.getElementById('date-tabs-container');
        container.innerHTML = '';
        dates.forEach(d => {
            const btn = document.createElement('button');
            btn.className = `date-btn ${d === activeDate ? 'active' : ''}`;
            btn.innerText = d.substring(5);
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(d);
            };
            container.appendChild(btn);
        });
    }

    function renderGames(dateStr) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        const games = dataset[dateStr] || [];
        
        if(games.length === 0) {
            document.getElementById('no-data-msg').style.display = 'block';
            return;
        }
        document.getElementById('no-data-msg').style.display = 'none';

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = `card ${game.status === 'Live' ? 'live-border' : ''}`;
            
            let statusLabel = game.status === 'Live' ? '🔴 進行中' : (game.status === 'Final' ? '已結束' : '未開始');
            let statusClass = game.status === 'Live' ? 'status-live' : (game.status === 'Final' ? 'status-final' : 'status-upcoming');

            // 處理團隊數據保底
            const sAway = game.team_stats?.away || { "AVG": ".000", "OBP": ".000", "SLG": ".000", "HR": "0" };
            const sHome = game.team_stats?.home || { "AVG": ".000", "OBP": ".000", "SLG": ".000", "HR": "0" };

            card.innerHTML = `
                <div class="card-header">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">${game.time}</span>
                </div>
                
                <div class="matchup-row">
                    <div class="team-display">
                        <img src="${game.away_logo}" class="team-logo">
                        <div class="team-name">${game.away_team}</div>
                        <div class="team-record">${game.away_record}</div>
                    </div>
                    <div style="display:flex; gap:15px; align-items:center;">
                        <span class="live-score">${game.status !== 'Upcoming' ? game.rhe.away.R : '-'}</span>
                        <span style="font-weight:800; color:var(--text-muted);">VS</span>
                        <span class="live-score">${game.status !== 'Upcoming' ? game.rhe.home.R : '-'}</span>
                    </div>
                    <div class="team-display">
                        <img src="${game.home_logo}" class="team-logo">
                        <div class="team-name">${game.home_team}</div>
                        <div class="team-record">${game.home_record}</div>
                    </div>
                </div>

                <div class="pitcher-container">
                    <div class="section-title"> Probable / Matchup Pitcher</div>
                    <div class="p-row">
                        <div class="p-box">
                            <div style="font-weight:700; color:#1e293b;">${game.pitchers.probable_away.name}</div>
                            <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">${game.pitchers.probable_away.stats}</div>
                        </div>
                        <div class="p-box" style="text-align:right;">
                            <div style="font-weight:700; color:#1e293b;">${game.pitchers.probable_home.name}</div>
                            <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">${game.pitchers.probable_home.stats}</div>
                        </div>
                    </div>
                </div>

                <div class="stats-box">
                    <div class="section-title">📊 賽季團隊打擊火力正面對決 (Sports Analytics)</div>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>球隊</th>
                                <th>打擊率 AVG</th>
                                <th>上壘率 OBP</th>
                                <th>長打率 SLG</th>
                                <th>總全壘打 HR</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style="text-align:left; font-weight:800; color:var(--mlb-blue);">${game.away_team}</td>
                                <td>${sAway.AVG}</td>
                                <td>${sAway.OBP}</td>
                                <td>${sAway.SLG}</td>
                                <td>${sAway.HR}</td>
                            </tr>
                            <tr>
                                <td style="text-align:left; font-weight:800; color:var(--mlb-blue);">${game.home_team}</td>
                                <td>${sHome.AVG}</td>
                                <td>${sHome.OBP}</td>
                                <td>${sHome.SLG}</td>
                                <td>${sHome.HR}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
