<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 頂級數據主控台</title>
    <style>
        :root {
            /* ☀️ 全新頂級淺色系調色盤 */
            --bg-primary: #f8fafc;       /* 乾淨的極淺灰藍背景 */
            --bg-secondary: #f1f5f9;     /* 用於導覽列、次要背景的區隔 */
            --card-bg: #ffffff;          /* 純白卡片，讓數據更突出 */
            --text-main: #0f172a;        /* 沉穩的深色文字，保證最高對比讀取率 */
            --text-muted: #64748b;      /* 優雅的內斂灰，用於標題副字、表格欄位 */
            --mlb-blue: #041e42;        /* 大聯盟經典深藍，用於球隊名稱與主要強調 */
            --accent-orange: #ea580c;    /* 亮眼橘色，用於精準鎖定得分 R */
            --success-green: #16a34a;    /* 溫和綠色，用於已結束賽事 */
            --live-pulse: #dc2626;       /* 警戒紅色，用於直播中賽事 */
            --border-color: #e2e8f0;     /* 極細微的淺灰色邊框線 */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-main); 
            padding: 30px 20px;
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 🧭 水平導覽列 (Navbar) - 淺色質感升級 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px 28px;
            border-radius: 16px;
            margin-bottom: 35px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }
        
        .nav-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--mlb-blue);
            letter-spacing: -0.5px;
        }
        
        .nav-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        
        /* 右上角極簡球隊探索按鈕 */
        .explore-btn {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        
        .explore-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }
        
        .sync-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* 日期導覽列 (淺色現代風格) */
        .date-nav { display: flex; gap: 8px; justify-content: flex-start; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .date-nav::-webkit-scrollbar { height: 4px; }
        .date-nav::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .date-btn { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: #475569; 
            padding: 10px 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            white-space: nowrap;
            font-size: 0.9rem;
        }
        
        .date-btn:hover { background: #f8fafc; border-color: #94a3b8; color: var(--text-main); }
        
        /* 啟用狀態改為精緻的淺藍色高亮底 */
        .date-btn.active { 
            background: #e0f2fe; 
            border-color: #0284c7; 
            color: #0369a1; 
            box-shadow: 0 2px 8px rgba(2, 132, 199, 0.1); 
        }

        /* 賽事卡片網格 */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 50px; }
        
        .game-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 20px; 
            padding: 22px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.04); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        
        /* 卡片頭部狀態與時間 */
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; }
        .game-time { font-weight: 700; font-size: 1.05rem; color: var(--text-main); background: var(--bg-secondary); padding: 3px 10px; border-radius: 8px; }
        
        /* 狀態標籤美化 */
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-upcoming { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .status-live { background-color: #fef2f2; color: var(--live-pulse); border: 1px solid #fecaca; animation: pulse 1.5s infinite; }
        .status-final { background-color: #f0fdf4; color: var(--success-green); border: 1px solid #bbf7d0; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* RHE 表格樣式 */
        .rhe-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
        .rhe-table th, .rhe-table td { padding: 9px; text-align: center; font-size: 0.95rem; }
        .rhe-table th { color: var(--text-muted); font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid var(--border-color); }
        .rhe-table td { border-bottom: 1px solid var(--border-color); }
        
        /* 投手資訊區塊 */
        .pitcher-container { background: var(--bg-primary); border-radius: 12px; padding: 12px; margin-top: auto; border: 1px solid var(--border-color); }
        .pitcher-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .pitcher-grid { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; }
        .p-name { font-weight: 600; color: #334155; }

        footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid var(--border-color); margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-title">Sportscast Sigma</div>
            <div class="nav-subtitle">真實數據主控台（純事實、無預測、台灣開賽時間）</div>
        </div>
        <div class="nav-right">
            <a href="mlbmap.html" class="explore-btn">🧭 球隊探索</a>
            <div class="sync-info" id="sync-time">資料同步中...</div>
        </div>
    </nav>

    <div class="date-nav" id="date-navbar"></div>

    <div class="games-grid" id="games-container"></div>
</div>

<footer>
    <p>© 2026 Sportscast Sigma. 數據串接自大聯盟官方統計 API.</p>
</footer>

<script>
    let globalData = {};

    // 啟動並防快取載入資料
    fetch('data.json?t=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            globalData = data;
            document.getElementById('sync-time').innerText = `同步時間: ${data.meta.last_updated}`;
            buildDateNavbar();
        })
        .catch(err => {
            console.error("無法載入資料:", err);
            document.getElementById('games-container').innerHTML = '<div style="color:#dc2626; padding:20px; text-align:center;">無法讀取最新 data.json，請確認 Actions 是否成功執行。</div>';
        });

    // 建立日期導覽列
    function buildDateNavbar() {
        const navbar = document.getElementById('date-navbar');
        navbar.innerHTML = '';
        
        const sortedDates = Object.keys(globalData.dates).sort();
        if(sortedDates.length === 0) return;

        sortedDates.forEach((dateStr, idx) => {
            const btn = document.createElement('button');
            btn.className = 'date-btn';
            
            const parts = dateStr.split('-');
            btn.innerText = `${parts[1]}/${parts[2]}`;
            
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(dateStr);
            };

            if(idx === 0) {
                btn.classList.add('active');
                renderGames(dateStr);
            }
            navbar.appendChild(btn);
        });
    }

    // 渲染賽事卡片
    function renderGames(dateStr) {
        const grid = document.getElementById('games-container');
        grid.innerHTML = '';
        const games = globalData.dates[dateStr] || [];

        if(games.length === 0) {
            grid.innerHTML = '<div style="color:#64748b; padding:40px; grid-column: 1/-1; text-align:center; font-weight: 500;">📅 台灣時間此日無安排賽事</div>';
            return;
        }

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            let statusClass = 'status-upcoming';
            let statusLabel = '未開始';
            
            if(game.status === 'Live') { 
                statusClass = 'status-live'; 
                statusLabel = '🔴 比賽中'; 
            } else if(game.status === 'Final') { 
                statusClass = 'status-final'; 
                statusLabel = '已結束'; 
            }

            card.innerHTML = `
                <div class="card-header">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span class="game-time">⏱️ ${game.time}</span>
                </div>
                
                <table class="rhe-table">
                    <thead>
                        <tr>
                            <th style="text-align:left; width:40%;">球隊</th>
                            <th style="width:20%; font-weight:bold; color:var(--accent-orange);">R</th>
                            <th style="width:20%;">H</th>
                            <th style="width:20%;">E</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="text-align:left; font-weight:bold; color:var(--mlb-blue); font-size:1.1rem;">${game.away_team}</td>
                            <td style="font-weight:bold; color:var(--accent-orange); font-size:1.1rem;">${game.rhe?.away?.R ?? '-'}</td>
                            <td style="font-weight: 500; color: #334155;">${game.rhe?.away?.H ?? '-'}</td>
                            <td style="font-weight: 500; color: #334155;">${game.rhe?.away?.E ?? '-'}</td>
                        </tr>
                        <tr>
                            <td style="text-align:left; font-weight:bold; color:var(--mlb-blue); font-size:1.1rem;">${game.home_team}</td>
                            <td style="font-weight:bold; color:var(--accent-orange); font-size:1.1rem;">${game.rhe?.home?.R ?? '-'}</td>
                            <td style="font-weight: 500; color: #334155;">${game.rhe?.home?.H ?? '-'}</td>
                            <td style="font-weight: 500; color: #334155;">${game.rhe?.home?.E ?? '-'}</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pitcher-container">
                    <div class="pitcher-title">⚾ 預計先發投手</div>
                    <div class="pitcher-grid">
                        <div><span style="color:var(--text-muted);">${game.away_team}:</span> <span class="p-name">${game.pitchers?.away_starter || '未定 (TBD)'}</span></div>
                        <div><span style="color:var(--text-muted);">${game.home_team}:</span> <span class="p-name">${game.pitchers?.home_starter || '未定 (TBD)'}</span></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
