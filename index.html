<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 全能數據情報面板</title>
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --mlb-blue: #041e42;
            --mlb-red: #bf0d3e;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --live-pulse: #ef4444;
            --border-color: #e2e8f0;
            --table-hover: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-primary); color: var(--text-main); padding: 30px 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--mlb-blue); font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; }
        .update-tag { display: inline-block; background-color: #e2e8f0; color: var(--mlb-blue); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }

        .date-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .date-btn { padding: 8px 18px; font-size: 0.9rem; font-weight: 600; border: 1px solid var(--border-color); background-color: var(--card-bg); color: var(--text-main); border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .date-btn.active { background-color: var(--accent-orange); color: white; border-color: var(--accent-orange); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 950px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.02); overflow: hidden; display: flex; flex-direction: column; }
        .card.live-border { border: 2px solid var(--live-pulse); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.08); }

        .card-header { padding: 12px 20px; background-color: #f8fafc; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
        .status-upcoming { background-color: #e0f2fe; color: #0369a1; }
        .status-final { background-color: #fee2e2; color: var(--mlb-red); }
        .status-live { background-color: #d1fae5; color: var(--success-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .game-time { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }

        /* 🟢 賽前大圖對決樣式 */
        .matchup-header-teams { display: flex; justify-content: space-around; align-items: center; padding: 20px; }
        .team-box-display { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 35%; }
        .team-logo-large { width: 48px; height: 48px; object-fit: contain; }
        .team-name-large { font-size: 1.2rem; font-weight: 800; color: var(--mlb-blue); }
        .vs-text { font-size: 1.1rem; font-weight: 800; color: var(--text-muted); font-style: italic; }

        /* 🔴 賽中/賽後 R-H-E 表格比分樣式 */
        .card-body-table { padding: 16px 20px; }
        .score-table { width: 100%; border-collapse: collapse; }
        .score-table th { text-align: center; color: var(--text-muted); font-size: 0.75rem; font-weight: 700; padding-bottom: 6px; }
        .score-table th.team-col-head { text-align: left; }
        .score-table td { padding: 6px 0; vertical-align: middle; text-align: center; font-weight: 600; }
        .score-table td.team-col { text-align: left; display: flex; align-items: center; gap: 8px; }
        .team-logo-small { width: 26px; height: 26px; object-fit: contain; }
        .score-cell { font-size: 1.3rem !important; font-weight: 800 !important; color: #0f172a; width: 40px; }
        .card.live-border .score-cell { color: var(--live-pulse); }
        .stat-cell { color: var(--text-muted); font-weight: 500; width: 30px; font-size: 0.85rem !important; }

        /* 🧢 投手對決資訊塊 */
        .pitcher-対決-container { padding: 12px 20px; background: #f8fafc; border-top: 1px solid var(--border-color); }
        .pitcher-section-title { font-size: 0.75rem; font-weight: 800; color: var(--mlb-blue); letter-spacing: 0.05em; margin-bottom: 8px; }
        .pitcher-grid-row { display: flex; justify-content: space-between; gap: 15px; }
        .pitcher-card-half { width: 48%; }
        .p-name { font-size: 0.9rem; font-weight: 700; color: #1e293b; }
        .p-hand { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }
        .p-stats { font-size: 0.8rem; font-weight: 700; color: var(--accent-orange); }

        /* 📋 下拉詳細名單大系統 */
        .lineup-toggle-summary { padding: 10px; text-align: center; color: var(--text-muted); font-size: 0.8rem; font-weight: 700; cursor: pointer; list-style: none; border-top: 1px solid var(--border-color); background: #f8fafc; user-select: none; }
        .lineup-box-content { padding: 15px; display: flex; flex-direction: column; gap: 16px; }
        .lineup-title { font-size: 0.8rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        
        .lineup-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .lineup-table th { background: #f1f5f9; color: var(--text-muted); font-weight: 700; padding: 4px; text-align: center; }
        .lineup-table th.align-left { text-align: left; }
        .lineup-table td { padding: 5px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 600; }
        .lineup-table td.align-left { text-align: left; font-weight: 700; color: #334155; }
        .lineup-table tr:hover { background-color: var(--table-hover); }
        .empty-lineup-msg { text-align: center; padding: 12px; color: var(--text-muted); font-size: 0.8rem; font-style: italic; background: #f8fafc; border-radius: 4px; }

        #no-data-msg { text-align: center; padding: 50px; background-color: var(--card-bg); border-radius: 12px; color: var(--text-muted); display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚾ Sportscast Sigma 全能情報面板</h1>
        <div class="subtitle">三向賽事分流：開賽前看「預計九棒打線」，開打後與結束看「即時 R-H-E 計分板」</div>
        <div class="update-tag" id="sync-time">正在連線大聯盟官方 API 資料庫...</div>
    </header>

    <div class="date-tabs" id="date-tabs-container"></div>
    <div id="no-data-msg">選定日期無排定賽事數據。</div>
    <div class="dashboard-grid" id="game-grid"></div>
</div>

<script>
    let dataset = {};
    const teamLogoMap = {
        "AZ": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/ari.png", "ATL": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/atl.png",
        "BAL": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/bal.png", "BOS": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/bos.png",
        "CHC": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/chc.png", "CWS": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/cws.png",
        "CIN": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/cin.png", "CLE": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/cle.png",
        "COL": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/col.png", "DET": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/det.png",
        "HOU": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/hou.png", "KC": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/kc.png",
        "LAA": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/laa.png", "LAD": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/lad.png",
        "MIA": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/mia.png", "MIL": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/mil.png",
        "MIN": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/min.png", "NYM": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/nym.png",
        "NYY": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/nyy.png", "OAK": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/oak.png",
        "PHI": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/phi.png", "PIT": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/pit.png",
        "SD": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/sd.png", "SF": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/sf.png",
        "SEA": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/sea.png", "STL": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/stl.png",
        "TB": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/tb.png", "TEX": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/tex.png",
        "TOR": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/tor.png", "WSH": "https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/wsh.png"
    };

    const localTodayStr = new Date().toISOString().split('T')[0];

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('sync-time').innerText = `最後雲端同步：${data.meta?.last_updated || '剛剛'} (台灣時間)`;
            dataset = data.dates || {};
            const dateKeys = Object.keys(dataset).sort();
            if(dateKeys.length === 0) {
                document.getElementById('no-data-msg').style.display = 'block';
                return;
            }
            let defaultDate = dateKeys.includes(localTodayStr) ? localTodayStr : dateKeys[0];
            renderTabs(dateKeys, defaultDate);
            renderGames(defaultDate);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('no-data-msg').style.display = 'block';
        });

    function renderTabs(dates, activeDate) {
        const container = document.getElementById('date-tabs-container');
        container.innerHTML = '';
        dates.forEach(d => {
            const btn = document.createElement('button');
            btn.className = `date-btn ${d === activeDate ? 'active' : ''}`;
            btn.innerText = (d === localTodayStr) ? `今天 (${d.substring(5)})` : d.substring(5);
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(d);
            };
            container.appendChild(btn);
        });
    }

    function generateLineupTable(lineupList) {
        if (!lineupList || lineupList.length === 0) {
            return `<div class="empty-lineup-msg"> 官方尚未公布今日先發打線 (通常開賽前2小時更新)</div>`;
        }
        let rows = lineupList.map((p, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td class="align-left">${p.name} <span style="color:#64748b; font-size:0.65rem;">(${p.pos}-${p.bats})</span></td>
                <td>${p.hr}</td>
                <td>${p.rbi}</td>
                <td>${p.sb}</td>
                <td>${p.avg}</td>
                <td style="color:var(--accent-orange);">${p.ops}</td>
            </tr>
        `).join('');

        return `
            <table class="lineup-table">
                <thead>
                    <tr>
                        <th style="width:25px;">棒</th>
                        <th class="align-left">打者</th>
                        <th>HR</th>
                        <th>RBI</th>
                        <th>SB</th>
                        <th>AVG</th>
                        <th>OPS</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    }

    function renderGames(dateStr) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        const games = dataset[dateStr] || [];
        
        if(games.length === 0) {
            document.getElementById('no-data-msg').style.display = 'block';
            return;
        }
        document.getElementById('no-data-msg').style.display = 'none';

        games.forEach(game => {
            const card = document.createElement('div');
            
            let statusClass = 'status-upcoming';
            let statusLabel = '未開始';
            let mainBodyHTML = '';
            let bottomSummaryText = '📊 展開雙方先發 9 棒打線名單';

            if (game.status === 'Final') {
                statusClass = 'status-final';
                statusLabel = '已結束';
                card.className = 'card';
            } else if (game.status === 'Live') {
                statusClass = 'status-live';
                statusLabel = '🔴 進行中';
                card.className = 'card live-border';
            } else {
                card.className = 'card';
            }

            // 🎯 分流核心：如果未開始，畫大 Logo 對抗賽前圖；如果已開賽，畫 R-H-E 看板
            if (game.status === 'Upcoming') {
                mainBodyHTML = `
                    <div class="matchup-header-teams">
                        <div class="team-box-display">
                            <img src="${teamLogoMap[game.away_team] || ''}" class="team-logo-large">
                            <span class="team-name-large">${game.away_team}</span>
                        </div>
                        <div class="vs-text">VS</div>
                        <div class="team-box-display">
                            <img src="${teamLogoMap[game.home_team] || ''}" class="team-logo-large">
                            <span class="team-name-large">${game.home_team}</span>
                        </div>
                    </div>
                `;
                bottomSummaryText = `📋 展開雙方先發 9 棒打線與打擊三圍`;
            } else {
                const aR = game.rhe?.away?.R ?? '-';
                const aH = game.rhe?.away?.H ?? '-';
                const aE = game.rhe?.away?.E ?? '-';
                const hR = game.rhe?.home?.R ?? '-';
                const hH = game.rhe?.home?.H ?? '-';
                const hE = game.rhe?.home?.E ?? '-';

                mainBodyHTML = `
                    <div class="card-body-table">
                        <table class="score-table">
                            <thead>
                                <tr>
                                    <th class="team-col-head">球隊</th>
                                    <th>R</th>
                                    <th>H</th>
                                    <th>E</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="team-col">
                                        <img src="${teamLogoMap[game.away_team] || ''}" class="team-logo-small">
                                        <span style="font-size:1.05rem; font-weight:700;">${game.away_team}</span>
                                    </td>
                                    <td class="score-cell">${aR}</td>
                                    <td class="stat-cell">${aH}</td>
                                    <td class="stat-cell">${aE}</td>
                                </tr>
                                <tr>
                                    <td class="team-col">
                                        <img src="${teamLogoMap[game.home_team] || ''}" class="team-logo-small">
                                        <span style="font-size:1.05rem; font-weight:700;">${game.home_team}</span>
                                    </td>
                                    <td class="score-cell">${hR}</td>
                                    <td class="stat-cell">${hH}</td>
                                    <td class="stat-cell">${hE}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
                bottomSummaryText = `📊 查看投手進階單場表現與先發名單`;
            }

            const awayP = game.pitchers?.away || {};
            const homeP = game.pitchers?.home || {};
            const pitcherTitle = game.status === 'Final' ? '🏆 賽事投球決策結果' : (game.status === 'Live' ? '🔥 即時場上投球數據' : '🧢 PROBABLE PITCHERS (預計先發)');

            card.innerHTML = `
                <div class="card-header">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span class="game-time">${game.time || '--:--'}</span>
                </div>
                
                ${mainBodyHTML}

                <div class="pitcher-対決-container">
                    <div class="pitcher-section-title">${pitcherTitle}</div>
                    <div class="pitcher-grid-row">
                        <div class="pitcher-card-half">
                            <div class="p-name">${awayP.name || '未定'}</div>
                            <div class="p-hand" style="color:var(--text-muted);">${awayP.meta || ''}</div>
                            <div class="p-stats">${awayP.stats || ''}</div>
                        </div>
                        <div class="pitcher-card-half" style="text-align: right;">
                            <div class="p-name">${homeP.name || '未定'}</div>
                            <div class="p-hand" style="color:var(--text-muted);">${homeP.meta || ''}</div>
                            <div class="p-stats">${homeP.stats || ''}</div>
                        </div>
                    </div>
                </div>

                <div style="background: white;">
                    <details>
                        <summary class="lineup-toggle-summary">${bottomSummaryText}</summary>
                        <div class="lineup-box-content">
                            <div>
                                <div class="lineup-title">
                                    <img src="${teamLogoMap[game.away_team] || ''}" style="width:14px;height:14px;"> 
                                    <span>${game.away_team} 團隊陣容資訊</span>
                                </div>
                                ${generateLineupTable(game.lineups?.away)}
                            </div>
                            <div style="margin-top: 8px;">
                                <div class="lineup-title">
                                    <img src="${teamLogoMap[game.home_team] || ''}" style="width:14px;height:14px;"> 
                                    <span>${game.home_team} 團隊陣容資訊</span>
                                </div>
                                ${generateLineupTable(game.lineups?.home)}
                            </div>
                        </div>
                    </details>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
