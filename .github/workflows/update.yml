name: MLB Data Scraper

on:
  schedule:
    # 每 3 小時自動執行一次爬蟲
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允許你隨時上 GitHub 網站手動點擊更新

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 執行 MLB 爬蟲
      # 這裡完全對應你的檔案名稱 update_stats.py
      run: python update_stats.py

    - name: 檢查檔案變更並提交回 GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 強制讓雲端機器人把產生的 data.json 抓起來準備上傳
        git add -f data.json
        
        # 檢查是否有抓到新資料，有的話就自動更新
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新 MLB 賽事數據" && git push)