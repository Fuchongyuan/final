name: Auto Update Data

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小時雲端自動跑一次爬蟲
  workflow_dispatch:      # 允許在網頁上手動點擊按鈕觸發

permissions:
  contents: write         # 關鍵：賦予機器人寫入 data.json 的權限

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4

    - name: Run Data Engine
      run: python update_stats.py

    - name: Commit and Push if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 雲端自動更新賽事數據" && git push)