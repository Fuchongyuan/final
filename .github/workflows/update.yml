name: MLB Data Auto Update

on:
  schedule:
    - cron: '0 22 * * *' # 每天台灣時間早上 6:00 自動執行 (UTC 22:00)
  workflow_dispatch: # 允許你在 GitHub 網頁介面上手動點擊按鈕強制執行

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 3.10 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝 pybaseball 與相關依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install pybaseball pandas

    - name: 執行高容錯數據快取腳本
      run: python update_stats.py

    - name: 自動將最新產出的 data.json 推回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: 雲端核心自動同步 MLB 最新數據" && git push)