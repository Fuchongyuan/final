<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB 分區戰績表 | Sportscast Sigma</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-orange: #ea580c;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: var(--text-main); 
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header-section { margin-bottom: 30px; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .back-link:hover { color: #fff; }
        .title { font-size: 2rem; font-weight: 800; margin-top: 10px; display: flex; align-items: center; gap: 15px; }

        /* 戰績卡片容器 */
        .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(580px, 1fr)); gap: 24px; }
        .division-card { background: var(--bg-secondary); border-radius: 16px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .div-name { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 20px; border-left: 5px solid var(--accent-orange); padding-left: 15px; }
        
        /* 專業表格 */
        .std-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .std-table th { color: var(--text-muted); padding: 12px 8px; border-bottom: 2px solid rgba(255,255,255,0.1); text-align: center; }
        .std-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .std-table tr:hover { background: rgba(255,255,255,0.05); }
        .text-left { text-align: left !important; font-weight: 700; color: #fff; }
        
        /* 徽章樣式 */
        .team-img { width: 24px; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <a href="index.html" class="back-link">← 返回主控台</a>
        <h1 class="title">📊 大聯盟完整分區戰績</h1>
    </div>
    
    <div id="standings-container" class="standings-grid">
        <div style="color:var(--text-muted);">正在載入即時統計數據...</div>
    </div>
</div>

<script>
    // 假設你的 data.json 有 teamLogoMap，若無請確保該變數在全域可用
    const teamLogoMap = {
        "NYY": "https://www.mlbstatic.com/team-logos/147.svg",
        "LAD": "https://www.mlbstatic.com/team-logos/119.svg",
        // 你可以在此補齊更多縮寫，或從 data.json 取得連結
    };

    document.addEventListener("DOMContentLoaded", () => {
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                renderStandings(data.standings);
            })
            .catch(err => {
                document.getElementById('standings-container').innerHTML = '<div style="color:red;">載入失敗，請檢查資料來源</div>';
            });
    });

    function renderStandings(standings) {
        const container = document.getElementById('standings-container');
        container.innerHTML = '';

        Object.keys(standings).forEach(divName => {
            const divCard = document.createElement('div');
            divCard.className = 'division-card';

            let rowsHTML = '';
            standings[divName].forEach((team, index) => {
                rowsHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="text-left">
                            <img src="${teamLogoMap[team.code] || 'https://via.placeholder.com/24'}" class="team-img" onerror="this.style.display='none'">
                            ${team.name}
                        </td>
                        <td>${team.w}</td>
                        <td>${team.l}</td>
                        <td>${team.gb || '-'}</td>
                        <td>${team.pct || '--'}</td>
                        <td>${team.l10 || '--'}</td>
                    </tr>
                `;
            });

            divCard.innerHTML = `
                <div class="div-name">${divName}</div>
                <table class="std-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th class="text-left">球隊</th>
                            <th>勝</th>
                            <th>敗</th>
                            <th>勝差</th>
                            <th>勝率</th>
                            <th>近10場</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHTML}</tbody>
                </table>
            `;
            container.appendChild(divCard);
        });
    }
</script>
</body>
</html>
