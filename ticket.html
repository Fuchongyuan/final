<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 🎫 購票確認</title>
    <style>
        :root {
            /* ☀️ 完美對齊 index.html 的頂級淺色系調色盤 */
            --bg-primary: #f8fafc;       
            --bg-secondary: #f1f5f9;     
            --card-bg: #ffffff;          
            --text-main: #0f172a;        
            --text-muted: #64748b;      
            --mlb-blue: #041e42;        
            --accent-orange: #ea580c;    
            --border-color: #e2e8f0;     
            --seatgeek-green: #108a00;   
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-main); 
            padding: 30px 20px;
            min-height: 100vh;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* 🧭 導覽列 (Navbar) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .nav-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--mlb-blue);
            letter-spacing: -0.5px;
        }
        
        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-main);
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* 🎫 購票確認卡片 */
        .ticket-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .matchup-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        /* 對戰球隊 */
        .matchup-teams {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--mlb-blue);
        }

        .vs-badge {
            font-size: 0.85rem;
            font-weight: 800;
            color: white;
            background-color: var(--accent-orange);
            padding: 5px 12px;
            border-radius: 50px;
        }

        /* ⚾ 預計先發投手 (只保留投手，無比分與數據) */
        .pitcher-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 30px;
            text-align: left;
        }

        .pitcher-box-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .pitcher-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 6px 4px;
        }

        .pitcher-line:not(:last-child) {
            border-bottom: 1px dashed var(--border-color);
        }

        .pitcher-team {
            color: var(--text-muted);
            font-weight: 600;
        }

        .pitcher-name {
            font-weight: 700;
            color: #334155;
        }

        /* 💰 價格區塊 */
        .price-showcase {
            border-top: 1px dashed var(--border-color);
            padding-top: 25px;
            margin-bottom: 30px;
        }

        .price-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price-value {
            font-size: 3rem;
            color: var(--seatgeek-green);
            font-weight: 900;
        }

        .price-currency {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* 🚀 直達購票按鈕 */
        .checkout-btn {
            display: inline-block;
            width: 100%;
            background: linear-gradient(135deg, #108a00 0%, #0b5e00 100%);
            color: white;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 8px 16px rgba(16, 138, 0, 0.15);
            transition: all 0.2s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(16, 138, 0, 0.25);
        }

        .no-params-msg {
            color: var(--text-muted);
            font-style: italic;
            padding: 40px 0;
            line-height: 1.6;
        }

        footer { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.85rem; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <div class="nav-title">🎫 購票確認主控台</div>
        <a href="index.html" class="back-btn">← 返回賽事列表</a>
    </nav>

    <div class="ticket-card" id="ticket-info-card">
        </div>
</div>

<footer>
    <p>© 2026 Sportscast Sigma. 數據完全由首頁安全對接傳輸.</p>
</footer>

<script>
    // 1. 解析網址列帶過來的 GET 參數（包含首頁早已載入好的 隊名、票價、SeatGeek URL）
    function getUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        return {
            home: urlParams.get('home'),
            away: urlParams.get('away'),
            price: urlParams.get('price'),
            url: urlParams.get('url')
        };
    }

    // 2. 依然從小組的 data.json 撈取投手資訊，保持數據統一同步
    async function fetchLocalPitcherInfo(homeTeam) {
        try {
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            
            for (const dateStr in data.dates) {
                const game = data.dates[dateStr].find(g => g.home_team === homeTeam);
                if (game) {
                    return game.pitchers;
                }
            }
        } catch (e) {
            console.error("讀取本地投手資料失敗:", e);
        }
        return null;
    }

    // 頁面載入核心邏輯
    window.addEventListener('DOMContentLoaded', async () => {
        const params = getUrlParams();
        const cardContainer = document.getElementById('ticket-info-card');

        // 只要首頁有成功把主客隊傳過來
        if (params.home && params.away) {
            const homeTeam = decodeURIComponent(params.home);
            const awayTeam = decodeURIComponent(params.away);
            
            // 接收來自首頁的票價與真實 SeatGeek 網址，若無則防呆
            const displayPrice = params.price ? decodeURIComponent(params.price).replace('$', '').replace('+', '') : '查看';
            const seatgeekUrl = params.url ? decodeURIComponent(params.url) : `https://seatgeek.com/search?search=${encodeURIComponent(homeTeam + " Tickets")}`;

            // 非同步取得 local 的 data.json 投手資料
            const localPitchers = await fetchLocalPitcherInfo(homeTeam);
            const awayStarter = localPitchers?.away_starter || "未定 (TBD)";
            const homeStarter = localPitchers?.home_starter || "未定 (TBD)";

            // 直接進行高質感靜態渲染，不呼叫任何第三方 API
            cardContainer.innerHTML = `
                <div class="matchup-title">當前選擇賽事</div>
                
                <div class="matchup-teams">
                    <div class="team-display">${awayTeam}</div>
                    <div class="vs-badge">VS</div>
                    <div class="team-display">${homeTeam}</div>
                </div>
                
                <div class="pitcher-box">
                    <div class="pitcher-box-title">⚾ 預計先發投手對決</div>
                    <div class="pitcher-line">
                        <span class="pitcher-team">${awayTeam}</span>
                        <span class="pitcher-name">${awayStarter}</span>
                    </div>
                    <div class="pitcher-line">
                        <span class="pitcher-team">${homeTeam}</span>
                        <span class="pitcher-name">${homeStarter}</span>
                    </div>
                </div>
                
                <div class="price-showcase">
                    <div class="price-label">SeatGeek 當前最低票價</div>
                    <div class="price-value">
                        ${displayPrice}
                        <span class="price-currency">USD</span>
                    </div>
                </div>
                
                <a href="${seatgeekUrl}" target="_blank" class="checkout-btn">
                    前往 SeatGeek 挑選座位並購票 ➔
                </a>
            `;
        } else {
            // 防呆提示
            cardContainer.innerHTML = `
                <div class="no-params-msg">
                    <p style="font-size: 2.5rem; margin-bottom: 15px;">⚾</p>
                    <p style="font-weight: 600; color: var(--text-main); margin-bottom: 8px;">未選擇特定賽事場次</p>
                    <p style="font-size: 0.9rem; margin-bottom: 20px;">請返回首頁，點擊您感興趣的賽事卡片下方的「購票去」按鈕。</p>
                    <a href="index.html" class="back-btn" style="display: inline-block;">回賽事首頁</a>
                </div>
            `;
        }
    });
</script>
</body>
</html>
