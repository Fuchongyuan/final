<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportscast Sigma - 🎫 賽事購票中心</title>
    <style>
        :root {
            /* ☀️ 完美對齊 index.html 的高質感淺色系調色盤 */
            --bg-primary: #f8fafc;       
            --bg-secondary: #f1f5f9;     
            --card-bg: #ffffff;          
            --text-main: #0f172a;        
            --text-muted: #64748b;      
            --mlb-blue: #041e42;        
            --accent-orange: #ea580c;    
            --border-color: #e2e8f0;     
            --seatgeek-green: #108a00;   
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-main); 
            padding: 30px 20px;
            min-height: 100vh;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 🧭 導覽列 (Navbar) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .nav-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--mlb-blue);
            letter-spacing: -0.5px;
        }
        
        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-main);
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .page-header {
            margin-bottom: 25px;
        }

        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--mlb-blue);
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 🗂️ 購票卡片網格 (Grid) */
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* 🎫 獨立賽事購票卡片 */
        .ticket-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -3px rgba(0, 0, 0, 0.08);
        }

        .date-badge {
            align-self: flex-start;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 4px 10px;
            border-radius: 50px;
            margin-bottom: 12px;
        }

        /* 對戰球隊 */
        .matchup-teams {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .team-display {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--mlb-blue);
        }

        .vs-badge {
            font-size: 0.75rem;
            font-weight: 800;
            color: white;
            background-color: var(--accent-orange);
            padding: 3px 8px;
            border-radius: 50px;
        }

        /* ⚾ 先發投手 */
        .pitcher-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .pitcher-line {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }
        
        .pitcher-line:not(:last-child) {
            border-bottom: 1px dashed var(--border-color);
        }

        .pitcher-team {
            color: var(--text-muted);
            font-weight: 600;
        }

        .pitcher-name {
            font-weight: 700;
            color: #334155;
        }

        /* 💰 價格區塊 */
        .price-section {
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .price-value {
            font-size: 1.6rem;
            color: var(--seatgeek-green);
            font-weight: 800;
        }

        .price-currency {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* 🚀 購票按鈕 */
        .checkout-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #108a00 0%, #0b5e00 100%);
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(16, 138, 0, 0.1);
            transition: all 0.2s ease;
        }

        .checkout-btn:hover {
            box-shadow: 0 6px 14px rgba(16, 138, 0, 0.2);
            filter: brightness(1.1);
        }

        .loading-msg {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 50px 0;
            grid-column: 1 / -1;
        }

        footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.85rem; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <div class="nav-title">🎫 賽事購票中心</div>
        <a href="index.html" class="back-btn">← 返回數據首頁</a>
    </nav>

    <div class="page-header">
        <h2>所有熱門場次最低票價</h2>
        <p>即時票價同步自首頁數據，點擊按鈕可直接跳轉至 SeatGeek 官網安全選位購票。</p>
    </div>

    <div class="ticket-grid" id="ticket-grid-container">
        <div class="loading-msg">正在讀取最新票務數據檔案...</div>
    </div>
</div>

<footer>
    <p>© 2026 Sportscast Sigma. 票務數據由 SeatGeek 核心引擎驅動.</p>
</footer>

<script>
    // 核心邏輯：直接讀取小組的 data.json 並渲染所有場次的購票入口
    async function loadAllTickets() {
        const container = document.getElementById('ticket-grid-container');
        
        try {
            // 加時間戳記防止快取，確保拿到最新資料
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            
            let htmlContent = '';
            let totalGames = 0;

            // 迭代 data.json 裡的所有日期
            for (const dateStr in data.dates) {
                const games = data.dates[dateStr];
                
                games.forEach(game => {
                    totalGames++;
                    
                    // 1. 安全抓取首頁早已計算好的最低價與連結
                    const displayPrice = game.ticket_info?.price ? game.ticket_info.price : '查看';
                    const seatgeekUrl = game.ticket_info?.url ? game.ticket_info.url : `https://seatgeek.com/search?search=${encodeURIComponent(game.home_team + " Tickets")}`;
                    
                    // 2. 抓取先發投手資料
                    const awayStarter = game.pitchers?.away_starter || "未定 (TBD)";
                    const homeStarter = game.pitchers?.home_starter || "未定 (TBD)";

                    // 3. 組裝卡片 HTML
                    htmlContent += `
                        <div class="ticket-card">
                            <div>
                                <div class="date-badge">📅 ${dateStr}</div>
                                
                                <div class="matchup-teams">
                                    <span class="team-display">${game.away_team}</span>
                                    <span class="vs-badge">VS</span>
                                    <span class="team-display">${game.home_team}</span>
                                </div>
                                
                                <div class="pitcher-box">
                                    <div class="pitcher-line">
                                        <span class="pitcher-team">${game.away_team}</span>
                                        <span class="pitcher-name">${awayStarter}</span>
                                    </div>
                                    <div class="pitcher-line">
                                        <span class="pitcher-team">${game.home_team}</span>
                                        <span class="pitcher-name">${homeStarter}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <div class="price-section">
                                    <span class="price-label">SeatGeek 最低價</span>
                                    <span class="price-value">
                                        ${displayPrice.replace('$', '').replace('+', '')} 
                                        <span class="price-currency">USD</span>
                                    </span>
                                </div>
                                
                                <a href="${seatgeekUrl}" target="_blank" class="checkout-btn">
                                    立即前往購票 ➔
                                </a>
                            </div>
                        </div>
                    `;
                });
            }

            // 如果檔案內沒比賽的防呆
            if (totalGames === 0) {
                container.innerHTML = `<div class="loading-msg">目前沒有開放購票的賽事場次。</div>`;
            } else {
                container.innerHTML = htmlContent;
            }

        } catch (error) {
            console.error("載入購票數據失敗:", error);
            container.innerHTML = `<div class="loading-msg" style="color: #ef4444;">無法讀取 data.json 數據，請確認檔案路徑是否正確。</div>`;
        }
    }

    // 頁面載入時自動執行
    window.addEventListener('DOMContentLoaded', loadAllTickets);
</script>
</body>
</html>
